# AirTellecta quarkus Configuration
# App
quarkus.application.name=airtellecta-backend

# HTTP
quarkus.http.port=8080
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:8081,http://localhost:19006,http://localhost:5173,http://localhost:5174}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Disposition

# MySQL
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=${DB_URL}
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}

# DDL
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Health
quarkus.smallrye-health.ui.always-include=true

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# Logging
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
quarkus.log.level=INFO
quarkus.log.category."com.airtellecta".level=DEBUG

# Security
quarkus.http.auth.proactive=true

# Firebase Authentication
# Local: set FIREBASE_CREDENTIALS_PATH en .env apuntando al JSON
# Producción: set FIREBASE_CREDENTIALS_BASE64 con el JSON en base64
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:}
firebase.credentials.base64=${FIREBASE_CREDENTIALS_BASE64:skip}

# Security Headers
quarkus.http.header."X-Content-Type-Options".value=nosniff
quarkus.http.header."X-Frame-Options".value=DENY
quarkus.http.header."X-XSS-Protection".value=1; mode=block
quarkus.http.header."Strict-Transport-Security".value=max-age=31536000; includeSubDomains; preload
quarkus.http.header."Cache-Control".value=no-store, no-cache, must-revalidate
quarkus.http.header."Content-Security-Policy".value=default-src 'none'; frame-ancestors 'none'
quarkus.http.header."Referrer-Policy".value=no-referrer
quarkus.http.header."Permissions-Policy".value=geolocation=(), microphone=(), camera=()